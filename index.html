<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Games — Entrenamiento gamificado</title>
<link rel="stylesheet" href="engine/styles.css" />
<style>
  body{
    margin:0;
    background: var(--white);
    font-family: var(--font);
    color: var(--ink);
  }

  /* ---------- hero, igual al bloque de apertura de una página de producto ---------- */
  .hero{
    padding: 96px 24px 72px;
    text-align:center;
    border-bottom: 1px solid var(--line);
  }
  .hero-eyebrow{
    font-size:13px; font-weight:700; letter-spacing:.14em;
    color: var(--red); text-transform:uppercase; margin-bottom:14px;
  }
  .hero h1{
    font-size: clamp(40px, 6vw, 64px);
    font-weight:800;
    letter-spacing:-.02em;
    margin: 0 0 16px;
    color: var(--black);
  }
  .hero p{
    font-size:17px;
    color: var(--ink-soft);
    max-width: 560px;
    margin: 0 auto;
    line-height:1.6;
  }

  /* ---------- grilla de juegos ---------- */
  .menu-wrap{ max-width: 1000px; margin: 0 auto; padding: 64px 24px 96px; }
  .menu-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 24px; }
  .menu-card{
    background: var(--white);
    border:1px solid var(--line);
    border-radius: 20px;
    padding: 32px;
    display:flex; flex-direction:column; gap:16px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .menu-card:hover{
    border-color: var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,.08);
  }
  .menu-card .tag{
    font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color: var(--red); align-self:flex-start;
    background: var(--red-soft); padding: 5px 10px; border-radius:999px;
  }
  .menu-card h3{ margin:0; font-size:20px; font-weight:700; color: var(--black); }
  .menu-card p{ margin:0; color: var(--ink-soft); font-size:14px; line-height:1.55; flex:1; }
  .menu-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .menu-actions a{
    display:inline-flex; align-items:center; justify-content:center;
    text-decoration:none; font-weight:600; font-size:13.5px;
    padding:11px 22px; border-radius:999px;
    transition: background .15s ease, border-color .15s ease;
  }
  .menu-actions a.primary{ background: var(--black); color:#fff; }
  .menu-actions a.primary:hover{ background: var(--red); }
  .menu-actions a.secondary{ background:transparent; border:1.5px solid var(--line); color: var(--ink); }
  .menu-actions a.secondary:hover{ border-color: var(--ink); }
</style>
</head>
<body>

  <div class="hero">
    <div class="hero-eyebrow">Field Force · Huawei CBG Colombia</div>
    <h1>FF GAMES</h1>
    <p>Repasos y entrenamientos gamificados para el equipo de campo. Elige un juego para practicar solo, o abre el modo en vivo para jugar en grupo con ranking en tiempo real.</p>
  </div>

  <div class="menu-wrap">
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <script>
    // Catálogo de juegos disponibles. Para agregar uno nuevo: crea el JSON en
    // /content y añade una línea aquí. No requiere tocar el motor.
    const CATALOG = [
      { id: 'nova-y73-ksps', tag: 'Producto', title: 'Misión Nova: KSPs del Y73', config: 'content/nova-y73-ksps.json', desc: 'Repaso de batería, resistencia, cámara, pantalla, almacenamiento y seguridad del HUAWEI nova Y73.' },
      { id: 'demo-hibrido-001', tag: 'Demo', title: 'Misión: Domina el portafolio', config: 'content/demo-hibrido.json', desc: 'Ejemplo combinando repaso narrativo y misión de fragmentos.' },
    ];

    const grid = document.getElementById('menu-grid');
    grid.innerHTML = CATALOG.map(g => `
      <div class="menu-card">
        <div class="tag">${g.tag}</div>
        <h3>${g.title}</h3>
        <p>${g.desc}</p>
        <div class="menu-actions">
          <a class="primary" href="play.html?config=${encodeURIComponent(g.config)}">Jugar solo</a>
          <a class="secondary" href="live/host.html?config=${encodeURIComponent(g.config)}">Modo en vivo</a>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
